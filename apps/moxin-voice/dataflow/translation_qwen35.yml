nodes:
  - id: moxin-mic-input
    path: dynamic
    env:
      SPEECH_START_FRAMES: "__SPEECH_START_FRAMES__"
      SPEECH_END_FRAMES: "__SPEECH_END_FRAMES__"
      SPEECH_END_MS: "__SPEECH_END_MS__"
      QUESTION_END_SILENCE_MS: "__QUESTION_END_SILENCE_MS__"
      MIN_SEGMENT_MS: "__MIN_SEGMENT_MS__"
      MAX_SEGMENT_MS: "__MAX_SEGMENT_MS__"
      START_RMS_THRESHOLD: "__START_RMS_THRESHOLD__"
      END_RMS_THRESHOLD: "__END_RMS_THRESHOLD__"
      PROGRESSIVE_INTERVAL_MS: "1500"
    outputs:
      - audio
      - audio_segment
      - is_speaking
      - speech_started
      - speech_ended
      - question_ended
      - log
      - status

  - id: asr
    path: __ASR_BIN_PATH__
    inputs:
      audio: moxin-mic-input/audio_segment
      question_ended: moxin-mic-input/question_ended
    outputs:
      - transcription
      - log
    env:
      LANGUAGE: "__TRANSLATION_SRC_LANG__"
      LOG_LEVEL: INFO

  - id: translator
    path: __TRANSLATOR_BIN_PATH__
    inputs:
      text: asr/transcription
    outputs:
      - source_text
      - translation
      - log
    env:
      SRC_LANG: "__TRANSLATION_SRC_LANG__"
      TGT_LANG: "__TRANSLATION_TGT_LANG__"
      PASSTHROUGH: "__TRANSLATOR_PASSTHROUGH__"
      QWEN35_TRANSLATOR_MODEL_PATH: ""
      TEMPERATURE: "0.0"
      MAX_TOKENS: "256"
      LOG_LEVEL: INFO

  - id: moxin-translation-listener
    path: dynamic
    inputs:
      source_text: translator/source_text
      translation: translator/translation
      log: translator/log
