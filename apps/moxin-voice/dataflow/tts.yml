nodes:
  # Audio input for voice cloning (sends recorded audio to ASR)
  - id: moxin-audio-input
    path: dynamic
    outputs:
      - audio # Audio segment for ASR

  # ASR for voice cloning transcription
  - id: asr
    build: pip install -e ../../../node-hub/dora-asr
    path: dora-asr
    inputs:
      audio: moxin-audio-input/audio
    outputs:
      - transcription
      - status
      - log
    env:
      USE_GPU: "false"
      ASR_ENGINE: "funasr"
      LANGUAGE: "zh"
      LOG_LEVEL: "INFO"

  # ASR listener - receives transcription from ASR node
  - id: moxin-asr-listener
    path: dynamic
    inputs:
      transcription: asr/transcription

  - id: moxin-prompt-input
    path: dynamic
    outputs:
      - control

  - id: primespeech-tts
    # Dev dataflow: use debug node binary to avoid manual --release rebuilds.
    path: ../../../target/debug/moxin-tts-node
    inputs:
      text: moxin-prompt-input/control
    outputs:
      - audio
      - status
      - segment_complete
      - log
    env:
      VOICE_NAME: "Doubao"
      # Model directory (defaults to ~/.OminiX/models/gpt-sovits-mlx)
      # GPT_SOVITS_MODEL_DIR: $HOME/.OminiX/models/gpt-sovits-mlx
      LOG_LEVEL: INFO

  - id: moxin-audio-player
    path: dynamic
    inputs:
      audio: primespeech-tts/audio
    outputs:
      - buffer_status
