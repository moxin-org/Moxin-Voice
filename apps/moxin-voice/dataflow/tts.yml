nodes:
  # Audio input for voice cloning (sends recorded audio to ASR)
  - id: moxin-audio-input
    path: dynamic
    outputs:
      - audio # Audio segment for ASR

  # ASR for voice cloning transcription
  - id: asr
    build: pip install -e ../../../node-hub/dora-asr
    path: dora-asr
    inputs:
      audio: moxin-audio-input/audio
    outputs:
      - transcription
      - status
      - log
    env:
      USE_GPU: "false"
      ASR_ENGINE: "funasr"
      LANGUAGE: "zh"
      LOG_LEVEL: "INFO"

  # ASR listener - receives transcription from ASR node
  - id: moxin-asr-listener
    path: dynamic
    inputs:
      transcription: asr/transcription

  - id: moxin-prompt-input
    path: dynamic
    outputs:
      - control

  - id: primespeech-tts
    # Qwen3-only: run_tts_backend.sh now always launches qwen-tts-node.
    # Node id kept as "primespeech-tts" for compatibility with bridge code that
    # references this id. See doc/REFACTOR_QWEN3_ONLY.md.
    path: ../../../scripts/run_tts_backend.sh
    inputs:
      text: moxin-prompt-input/control
    outputs:
      - audio
      - status
      - segment_complete
      - log
    env:
      VOICE_NAME: "vivian"
      MOXIN_INFERENCE_BACKEND: "__MOXIN_INFERENCE_BACKEND__"
      MOXIN_ZERO_SHOT_BACKEND: "__MOXIN_ZERO_SHOT_BACKEND__"
      LOG_LEVEL: INFO

  - id: moxin-audio-player
    path: dynamic
    inputs:
      audio: primespeech-tts/audio
    outputs:
      - buffer_status
