nodes:
  # Audio input for voice cloning (sends recorded audio to ASR)
  - id: moxin-audio-input
    path: dynamic
    outputs:
      - audio # Audio segment for ASR

  # ASR for voice cloning transcription (Qwen3-ASR MLX backend)
  - id: asr
    build: cargo build --release -p dora-qwen3-asr
    path: __ASR_BIN_PATH__
    inputs:
      audio: moxin-audio-input/audio
    outputs:
      - transcription
      - log
    env:
      # QWEN3_ASR_MODEL_PATH: ""  # defaults to ~/.OminiX/models/qwen3-asr-1.7b
      LANGUAGE: "zh"
      LOG_LEVEL: "INFO"

  # ASR listener - receives transcription from ASR node
  - id: moxin-asr-listener
    path: dynamic
    inputs:
      transcription: asr/transcription

  - id: moxin-prompt-input
    path: dynamic
    outputs:
      - control

  - id: primespeech-tts
    # Qwen3-only: launch qwen-tts-node directly (no shell wrapper).
    # Node id kept as "primespeech-tts" for compatibility with bridge/log paths.
    path: __QWEN_TTS_BIN_PATH__
    inputs:
      text: moxin-prompt-input/control
    outputs:
      - audio
      - status
      - segment_complete
      - log
    env:
      VOICE_NAME: "vivian"
      MOXIN_INFERENCE_BACKEND: "__MOXIN_INFERENCE_BACKEND__"
      MOXIN_ZERO_SHOT_BACKEND: "__MOXIN_ZERO_SHOT_BACKEND__"
      LOG_LEVEL: INFO

  - id: moxin-audio-player
    path: dynamic
    inputs:
      audio: primespeech-tts/audio
    outputs:
      - buffer_status
