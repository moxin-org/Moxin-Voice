nodes:
  # Live microphone capture — uses AecInputBridge (dynamic node).
  # Device name is read from SharedDoraState.translation_input_device at connect time
  # (set by the 更改 button in the translation settings page; empty = system default).
  - id: moxin-mic-input
    path: dynamic
    env:
      # Language-aware VAD settings (filled by screen.rs at dataflow start)
      SPEECH_START_FRAMES: "__SPEECH_START_FRAMES__"
      SPEECH_END_FRAMES: "__SPEECH_END_FRAMES__"
      SPEECH_END_MS: "__SPEECH_END_MS__"
      QUESTION_END_SILENCE_MS: "__QUESTION_END_SILENCE_MS__"
      MIN_SEGMENT_MS: "__MIN_SEGMENT_MS__"
      MAX_SEGMENT_MS: "__MAX_SEGMENT_MS__"
      START_RMS_THRESHOLD: "__START_RMS_THRESHOLD__"
      END_RMS_THRESHOLD: "__END_RMS_THRESHOLD__"
    outputs:
      - audio
      - audio_segment
      - is_speaking
      - speech_started
      - speech_ended
      - question_ended
      - log
      - status

  # ASR — dora-qwen3-asr binary.
  # Path placeholder is replaced with the absolute binary path at dataflow start.
  # Pre-build: cargo build --release -p dora-qwen3-asr
  - id: asr
    path: __ASR_BIN_PATH__
    inputs:
      # Feed VAD-segmented speech to ASR for better signal/noise ratio.
      audio: moxin-mic-input/audio_segment
    outputs:
      - transcription
      - log
    env:
      LANGUAGE: "__TRANSLATION_SRC_LANG__"   # replaced at dataflow start
      LOG_LEVEL: INFO

  # Translator — dora-qwen3-translator binary.
  # Path placeholder is replaced with the absolute binary path at dataflow start.
  # Pre-build: cargo build --release -p dora-qwen3-translator
  - id: translator
    path: __TRANSLATOR_BIN_PATH__
    inputs:
      text: asr/transcription
      question_ended: moxin-mic-input/question_ended
    outputs:
      - source_text    # pass-through of the original ASR text
      - translation    # translated text (streamed token-by-token)
      - log
    env:
      SRC_LANG: "__TRANSLATION_SRC_LANG__"
      TGT_LANG: "__TRANSLATION_TGT_LANG__"
      QWEN3_TRANSLATOR_MODEL_PATH: ""
      TEMPERATURE: "0.0"
      MAX_TOKENS: "256"
      LOG_LEVEL: INFO

  # Translation listener — dynamic Rust bridge node
  # Receives source_text + translation and dispatches to the UI overlay window.
  - id: moxin-translation-listener
    path: dynamic
    inputs:
      source_text: translator/source_text
      translation:  translator/translation
      log: translator/log
