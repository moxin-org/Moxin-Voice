nodes:
  # Audio input — reuse existing dynamic node
  - id: moxin-audio-input
    path: dynamic
    outputs:
      - audio

  # ASR — reuse existing dora-qwen3-asr node
  # Input language is configured per-session via LANGUAGE env var.
  # The translation pipeline accepts: zh, en, fr, ja, ko, de, es, ru, ar
  - id: asr
    build: cargo build --release -p dora-qwen3-asr
    path: ../../../target/release/dora-qwen3-asr
    inputs:
      audio: moxin-audio-input/audio
    outputs:
      - transcription
      - log
    env:
      LANGUAGE: "__TRANSLATION_SRC_LANG__"   # replaced at dataflow start
      LOG_LEVEL: INFO

  # Translator — new dora-qwen3-translator node
  # Receives ASR transcription, outputs translated text (streaming, token-level).
  # Also passes source text through for dual display in the overlay.
  - id: translator
    build: cargo build --release -p dora-qwen3-translator
    path: ../../../target/release/dora-qwen3-translator
    inputs:
      text: asr/transcription
    outputs:
      - source_text    # pass-through of the original ASR text
      - translation    # translated text (may be streamed token-by-token)
      - log
    env:
      SRC_LANG: "__TRANSLATION_SRC_LANG__"   # e.g. "zh", "en", "fr"
      TGT_LANG: "__TRANSLATION_TGT_LANG__"   # e.g. "en", "fr", "zh"
      # Model path defaults to ~/.OminiX/models/qwen3-8b-4bit
      # Override with QWEN3_TRANSLATOR_MODEL_PATH if needed
      QWEN3_TRANSLATOR_MODEL_PATH: ""
      # Translation quality: 0 = greedy (best for translation), >0 = sampling
      TEMPERATURE: "0.0"
      MAX_TOKENS: "256"
      LOG_LEVEL: INFO

  # Translation listener — dynamic Rust bridge node
  # Receives source_text + translation and dispatches to the UI overlay window.
  - id: moxin-translation-listener
    path: dynamic
    inputs:
      source_text: translator/source_text
      translation:  translator/translation
