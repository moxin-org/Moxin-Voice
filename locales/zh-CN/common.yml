# 应用程序通用 UI 字符串
# 这些字符串在多个组件和屏幕中使用

# 应用程序中使用的标准按钮标签
buttons:
  ok: "确定"                  # 确认按钮
  cancel: "取消"              # 取消操作按钮
  close: "关闭"               # 关闭对话框/窗口按钮
  save: "保存"                # 保存更改按钮
  delete: "删除"              # 删除项目按钮
  edit: "编辑"                # 编辑项目按钮
  add: "添加"                 # 添加新项目按钮
  remove: "移除"              # 移除项目按钮
  back: "返回"                # 返回按钮
  next: "下一步"              # 前进按钮
  confirm: "确认"             # 确认操作按钮

# UI 元素的通用标签
labels:
  loading: "加载中..."        # 加载指示器文本
  error: "错误"               # 错误消息标签
  success: "成功"             # 成功消息标签
  warning: "警告"             # 警告消息标签
  info: "信息"                # 信息消息标签
  participant: "参与者"       # 参与者标签（在面板中使用）

# 状态指示器
status:
  ready: "就绪"               # 系统就绪状态
  processing: "处理中..."     # 正在处理
  completed: "已完成"         # 任务成功完成
  failed: "失败"              # 任务失败
