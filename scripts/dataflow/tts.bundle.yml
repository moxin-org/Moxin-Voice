nodes:
  - id: moxin-audio-input
    path: dynamic
    outputs:
      - audio

  - id: asr
    # Rust binary bundled in Contents/MacOS/ — no Python/conda dependency.
    path: ../MacOS/dora-qwen3-asr
    inputs:
      audio: moxin-audio-input/audio
    outputs:
      - transcription
      - log
    env:
      LANGUAGE: "zh"
      LOG_LEVEL: "INFO"

  - id: moxin-asr-listener
    path: dynamic
    inputs:
      transcription: asr/transcription

  - id: moxin-prompt-input
    path: dynamic
    outputs:
      - control

  - id: qwen-tts
    # Relative to this file:
    # Contents/Resources/dataflow/tts.yml -> Contents/Resources/scripts/macos_run_tts_backend.sh
    path: ../scripts/macos_run_tts_backend.sh
    inputs:
      text: moxin-prompt-input/control
    outputs:
      - audio
      - status
      - segment_complete
      - log
    env:
      VOICE_NAME: "vivian"
      LOG_LEVEL: INFO

  - id: moxin-audio-player
    path: dynamic
    inputs:
      audio: qwen-tts/audio
    outputs:
      - buffer_status
